<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be Mine?</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff416c,#ff4b2b,#ff0080);
animation:bg 10s infinite alternate;
}

@keyframes bg{
100%{
filter:hue-rotate(40deg);
}
}

.container{
width:90%;
max-width:600px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
text-align:center;
color:white;
box-shadow:0 0 30px rgba(0,0,0,.3);
position:relative;
z-index:2;
}

h1{
font-size:38px;
margin-bottom:25px;
}

.question{
font-size:25px;
line-height:1.5;
min-height:120px;
margin-bottom:35px;
}

button{
padding:14px 35px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
margin:15px;
transition:.3s;
}

#nextBtn{
background:#fff;
color:#ff0066;
font-weight:bold;
}

#nextBtn:hover{
transform:scale(1.08);
}

#yesBtn{
background:#00d26a;
color:#fff;
font-weight:bold;
}

#yesBtn:hover{
transform:scale(1.1);
}

#noBtn{
background:#ff2e63;
color:white;
position:absolute;
}

#buttons{
display:none;
height:120px;
position:relative;
}

#result{
display:none;
font-size:40px;
font-weight:bold;
animation:zoom .8s;
}

@keyframes zoom{
from{
transform:scale(.2);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

/* Hearts */

.heart{
position:absolute;
bottom:-50px;
color:#fff;
font-size:20px;
animation:float 8s linear infinite;
opacity:.7;
}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-110vh) rotate(360deg);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">

<h1>❤️ Will You Be Mine? ❤️</h1>

<div id="question" class="question"></div>

<button id="nextBtn">Next ❤️</button>

<div id="buttons">
<button id="yesBtn">YES 💖</button>
<button id="noBtn">NO 😜</button>
</div>

<div id="result">
💖 I LOVE YOU SUMAN 💖
<br><br>
🌹 Thank You For Saying YES 🌹
</div>

</div>

<script>

const questions=[
"Do you believe destiny brings two hearts together? ❤️",
"Can a smile make someone's whole day better? 😊",
"Do you think true love is built on trust and respect? 💕",
"If someone truly cares for you, should they always stand by you? 🌹",
"My heart has already chosen you... Will you be mine forever? 💍"
];

let i=0;

const q=document.getElementById("question");
const next=document.getElementById("nextBtn");
const btns=document.getElementById("buttons");

q.innerHTML=questions[i];

next.onclick=function(){

i++;

if(i<questions.length){

q.innerHTML=questions[i];

}else{

q.innerHTML="❤️ Will You Be My Girlfriend? ❤️";

next.style.display="none";
btns.style.display="block";

}
}

const no=document.getElementById("noBtn");

no.addEventListener("mouseover",()=>{

const x=Math.random()*350;
const y=Math.random()*120;

no.style.left=x+"px";
no.style.top=y+"px";

});

document.getElementById("yesBtn").onclick=function(){

document.querySelector("h1").style.display="none";
q.style.display="none";
btns.style.display="none";

document.getElementById("result").style.display="block";

confetti();

}

/* Floating Hearts */

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*30)+"px";
heart.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

}

setInterval(createHeart,250);

/* Confetti */

function confetti(){

for(let i=0;i<200;i++){

let c=document.createElement("div");

c.innerHTML=["❤️","💖","💕","🌹","✨"][Math.floor(Math.random()*5)];

c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-20px";
c.style.fontSize=(20+Math.random()*20)+"px";
c.style.transition="5s linear";

document.body.appendChild(c);

setTimeout(()=>{
c.style.top="110vh";
c.style.transform="rotate(720deg)";
},100);

setTimeout(()=>{
c.remove();
},5500);

}

}

</script>

</body>
</html>
